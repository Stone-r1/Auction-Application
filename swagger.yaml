openapi: 3.0.3

info:
  title: Auction App API
  description: |
    REST API for the Auction application.

    **Authentication flow:**
    1. `POST /register` – create an account (a verification email is sent)
    2. `GET /verify?token=…` – click the link from the email to activate the account
    3. `POST /login` – receive a JWT bearer token
    4. Pass the token in every protected request: `Authorization: Bearer <token>`
  version: 1.0.0
  license:
    name: MIT

servers:
  - url: http://localhost:8080
    description: Local development
  - url: https://your-production-domain.com
    description: Production

# ── Security scheme ──────────────────────────────────────────────────────────
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  # ── Reusable schemas ───────────────────────────────────────────────────────
  schemas:

    # ── Requests ──────────────────────────────────────────────────────────────
    LoginRequest:
      type: object
      required: [username, password]
      properties:
        username:
          type: string
          example: john_doe
        password:
          type: string
          format: password
          example: Secret@123

    RegisterRequest:
      type: object
      required: [username, password, email]
      properties:
        username:
          type: string
          example: john_doe
        password:
          type: string
          format: password
          description: >
            Min 8 chars, must contain at least one uppercase letter,
            one lowercase letter, one digit and one special character (#?!@$%^&*-)
          example: Secret@123
        email:
          type: string
          format: email
          example: john@example.com
        birthDate:
          type: string
          format: date
          example: "1995-06-17"

    CreateAuctionRequest:
      type: object
      required: [itemName, itemDescription, startingPrice, startDate, duration]
      properties:
        itemName:
          type: string
          example: Vintage watch
        itemDescription:
          type: string
          example: A rare 1960s Swiss watch in excellent condition
        startingPrice:
          type: number
          format: double
          minimum: 0
          example: 150.00
        startDate:
          type: string
          format: date-time
          description: "Format: yyyy-MM-dd'T'HH:mm"
          example: "2026-07-01T10:00:00Z"
        duration:
          type: integer
          format: int64
          minimum: 1
          maximum: 120
          description: Duration of the auction in hours
          example: 48

    PlaceBidRequest:
      type: object
      required: [amount]
      properties:
        amount:
          type: number
          format: double
          minimum: 0
          description: Must be strictly greater than the current highest bid
          example: 250.00

    # ── Responses ─────────────────────────────────────────────────────────────
    Auction:
      type: object
      properties:
        auctionId:
          type: integer
          format: int64
          example: 1
        itemName:
          type: string
          example: Vintage watch
        itemDescription:
          type: string
          example: A rare 1960s Swiss watch in excellent condition
        startingPrice:
          type: number
          format: double
          example: 150.00
        startDate:
          type: string
          format: date-time
          example: "2026-07-01T10:00:00Z"
        endDate:
          type: string
          format: date-time
          example: "2026-07-03T10:00:00Z"
        maxBid:
          type: number
          format: double
          nullable: true
          example: 250.00
        sellerId:
          type: integer
          format: int64
          example: 42
        winnerId:
          type: integer
          format: int64
          nullable: true
          example: null
        auctionState:
          type: string
          enum: [NOT_STARTED, PENDING, ONGOING, FINISHED, CANCELED]
          example: ONGOING

    PageResultAuction:
      type: object
      properties:
        content:
          type: array
          items:
            $ref: '#/components/schemas/Auction'
        pageNumber:
          type: integer
          example: 0
        pageSize:
          type: integer
          example: 20
        totalElements:
          type: integer
          format: int64
          example: 53
        totalPages:
          type: integer
          example: 3

    ErrorMessage:
      type: object
      properties:
        status:
          type: integer
          example: 404
        timestamp:
          type: string
          format: date-time
          example: "2026-06-17T15:00:00.000Z"
        message:
          type: string
          example: Auction not found
        details:
          type: object
          additionalProperties:
            type: string
          example:
            auctionId: "7"

  # ── Reusable responses ────────────────────────────────────────────────────
  responses:
    Unauthorized:
      description: Missing or invalid JWT token
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorMessage'
          example:
            status: 401
            timestamp: "2026-06-17T15:00:00.000Z"
            message: Authentication failed
            details:
              reason: Invalid username or password.

    Forbidden:
      description: Account not verified or action not permitted
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorMessage'
          example:
            status: 403
            timestamp: "2026-06-17T15:00:00.000Z"
            message: Account not verified
            details:
              action: Check your email for the verification link.

    ValidationError:
      description: Request body failed validation
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorMessage'

# ── Default security (apply to every endpoint except auth) ───────────────────
security:
  - bearerAuth: []

# ── Paths ─────────────────────────────────────────────────────────────────────
paths:

  # ─────────────────────────── Auth ───────────────────────────────────────────
  /register:
    post:
      operationId: registerUser
      tags: [Authentication]
      summary: Register a new user
      description: >
        Creates a new user account and sends a verification email.
        The account cannot be used until the email link is clicked.
      security: []   # no token needed
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '200':
          description: Registration successful – verification email sent
          content:
            text/plain:
              schema:
                type: string
              example: "Registration successful. Please check your email to verify your account."
        '409':
          description: Username or email already taken
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'
              example:
                status: 409
                timestamp: "2026-06-17T15:00:00.000Z"
                message: User already exists
                details:
                  username: john_doe
        '503':
          description: Verification email could not be delivered
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'

  /verify:
    get:
      operationId: verifyEmail
      tags: [Authentication]
      summary: Verify email address
      description: >
        Activates the user account using the token from the verification email.
        The link is single-use and expires after a set period.
      security: []
      parameters:
        - name: token
          in: query
          required: true
          schema:
            type: string
          example: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
      responses:
        '200':
          description: Account verified (or was already verified)
          content:
            text/plain:
              schema:
                type: string
              examples:
                verified:
                  value: "Email verified successfully. You can now log in."
                alreadyVerified:
                  value: "This account is already verified."
        '404':
          description: Token not found / invalid
          content:
            text/plain:
              schema:
                type: string
              example: "This verification link is invalid."
        '410':
          description: Token has expired
          content:
            text/plain:
              schema:
                type: string
              example: "This verification link has expired."

  /login:
    post:
      operationId: loginUser
      tags: [Authentication]
      summary: Log in and receive a JWT
      description: >
        Returns a signed JWT bearer token valid for the configured expiration period.
        Pass it as `Authorization: Bearer <token>` on all protected endpoints.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: JWT token
          content:
            text/plain:
              schema:
                type: string
              example: "eyJhbGciOiJIUzI1NiJ9.eyJzdWIiOiJqb2huX2RvZSJ9.abc123"
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  # ─────────────────────────── Auctions ────────────────────────────────────────
  /auction/all:
    get:
      operationId: listAuctions
      tags: [Auctions]
      summary: List available auctions (paginated)
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 0
          description: Zero-based page number
        - name: size
          in: query
          schema:
            type: integer
            default: 20
          description: Number of auctions per page
      responses:
        '200':
          description: Paginated list of auctions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PageResultAuction'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /auction/create:
    post:
      operationId: createAuction
      tags: [Auctions]
      summary: Create a new auction
      description: >
        Creates an auction for the authenticated user as the seller.
        `itemName` must be unique per seller.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateAuctionRequest'
      responses:
        '201':
          description: Auction created
          content:
            text/plain:
              schema:
                type: string
              example: "Auction created successfully."
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '409':
          description: Auction with the same item name already exists for this seller
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'
              example:
                status: 409
                timestamp: "2026-06-17T15:00:00.000Z"
                message: Auction already exists
                details:
                  itemName: Vintage watch

  # ─────────────────────────── Bids ────────────────────────────────────────────
  /auction/{auctionId}/placeBid:
    post:
      operationId: placeBid
      tags: [Bids]
      summary: Place a bid on an auction
      description: >
        The bid `amount` must be strictly greater than the current highest bid.
        The auction must be in `ONGOING` state.
      parameters:
        - name: auctionId
          in: path
          required: true
          schema:
            type: integer
            format: int64
          example: 1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PlaceBidRequest'
      responses:
        '201':
          description: Bid placed successfully
          content:
            text/plain:
              schema:
                type: string
              example: "Bid placed successfully."
        '400':
          description: Bid amount is too low or invalid
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'
              examples:
                tooLow:
                  summary: Bid lower than current max
                  value:
                    status: 400
                    timestamp: "2026-06-17T15:00:00.000Z"
                    message: Bid amount is too low
                    details:
                      requestedAmount: "100.0"
                      minimumRequired: "250.0"
                invalid:
                  summary: Other invalid bid
                  value:
                    status: 400
                    timestamp: "2026-06-17T15:00:00.000Z"
                    message: Invalid Bid Exception
                    details:
                      reason: "You cannot bid on your own auction."
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          description: Auction state does not allow bidding
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'
              example:
                status: 403
                timestamp: "2026-06-17T15:00:00.000Z"
                message: Invalid auction state to perform the action
                details:
                  reason: "Auction is not in ONGOING state."
        '404':
          description: Auction not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'
              example:
                status: 404
                timestamp: "2026-06-17T15:00:00.000Z"
                message: Auction not found
                details:
                  auctionId: "1"
        '409':
          description: Auction is not currently accepting bids
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'
              example:
                status: 409
                timestamp: "2026-06-17T15:00:00.000Z"
                message: Auction is not accepting bids
                details:
                  auctionId: "1"
                  currentState: NOT_STARTED

